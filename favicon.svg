<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#051b2c"/>
  <!-- Kite diamond shape -->
  <polygon points="32,8 52,30 32,48 12,30" fill="#c5a059"/>
  <!-- Kite cross lines -->
  <line x1="32" y1="8" x2="32" y2="48" stroke="#051b2c" stroke-width="1.5"/>
  <line x1="12" y1="30" x2="52" y2="30" stroke="#051b2c" stroke-width="1.5"/>
  <!-- Kite tail -->
  <path d="M32,48 Q28,54 32,58 Q36,54 32,48" fill="none" stroke="#c5a059" stroke-width="2" stroke-linecap="round"/>
</svg>
